let current=0;
let phase=0;
let done=new Set();
let filtered=DAYS;

function filterPhase(p){
  phase=p;
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===p));
  filtered=p===0?DAYS:DAYS.filter(d=>d.phase===p);
  current=0;
  buildJumpBar();
  render();
}

function buildJumpBar(){
  const bar=document.getElementById('jumpBar');
  bar.innerHTML='';
  filtered.forEach((d,i)=>{
    const b=document.createElement('button');
    b.textContent=d.day;
    b.title='Day '+d.day+': '+d.title;
    if(i===current)b.classList.add('active');
    if(done.has(d.day))b.classList.add('done');
    b.onclick=()=>{current=i;buildJumpBar();render();};
    bar.appendChild(b);
  });
}

function go(dir){
  current=Math.max(0,Math.min(filtered.length-1,current+dir));
  buildJumpBar();
  render();
}

function render(){
  const d=filtered[current];
  if(!d)return;
  document.getElementById('dayBadge').textContent='Day '+d.day+' of '+filtered.length+(phase===0?' (of 30)':'');
  document.getElementById('prog').style.width=((d.day/30)*100)+'%';
  const card=document.getElementById('dayCard');
  card.innerHTML=`
<div class="day-header">
  <div class="day-num">Day ${d.day}</div>
  <h2>${d.title}</h2>
  <div class="meta">
    <span class="meta-pill"><i class="ti ti-clock" aria-hidden="true" style="font-size:12px"></i> ${d.duration}</span>
    <span class="phase-label">${d.phaseLabel}</span>
  </div>
</div>
<div class="sections">
  <div>
    <div class="sec-title"><i class="ti ti-target" aria-hidden="true"></i>Goal</div>
    <div class="sec-body">${d.goal}</div>
  </div>
  <div class="section-divider"></div>
  <div>
    <div class="sec-title"><i class="ti ti-link" aria-hidden="true"></i>Resources</div>
    <div class="sec-body"><ul>${d.resources.map(r=>`<li><a class="resource-link" href="${r.url}" target="_blank">${r.label}</a></li>`).join('')}</ul></div>
  </div>
  <div class="section-divider"></div>
  ${d.sections.map(s=>`
  <div>
    <div class="sec-title"><i class="ti ${s.icon}" aria-hidden="true"></i>${s.title}</div>
    <div class="sec-body">${s.body}</div>
  </div>
  <div class="section-divider"></div>
  `).join('')}
  <div>
    <div class="sec-title"><i class="ti ti-package" aria-hidden="true"></i>Deliverable</div>
    <div class="deliverable-box"><p>${d.deliverable}</p></div>
  </div>
  <div>
    <div class="sec-title"><i class="ti ti-brain" aria-hidden="true"></i>End-of-day self-test</div>
    <div class="self-test"><p>${d.selfTest}</p></div>
  </div>
  <div>
    <div class="sec-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Common mistakes</div>
    <div class="mistake-box"><p>${d.mistakes}</p></div>
  </div>
  <div>
    <div class="sec-title"><i class="ti ti-refresh" aria-hidden="true"></i>Revision requirement</div>
    <div class="revision-box"><p>${d.revision}</p></div>
  </div>
  <div style="padding-top:4px">
    <label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer">
      <input type="checkbox" ${done.has(d.day)?'checked':''} onchange="markDone(${d.day},this.checked)" style="accent-color:#3C3489;width:16px;height:16px">
      Mark Day ${d.day} as complete
    </label>
  </div>
</div>`;
}

function markDone(day,val){
  if(val)done.add(day);else done.delete(day);
  buildJumpBar();
}

buildJumpBar();
render();
</script>
